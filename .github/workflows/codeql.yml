# Reusable CodeQL — OPT-IN. Separate from security.yml because it needs
# security-events:write; the caller must grant that (see templates/caller-codeql.yml).
#
# Check context produced:
#   codeql / analyze
name: CodeQL

on:
  workflow_call:
    inputs:
      languages:
        type: string
        required: true
        description: 'Comma list, e.g. "javascript-typescript,python".'

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.languages }}
          queries: security-extended
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
