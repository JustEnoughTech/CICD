# Copy to each repo as .github/workflows/security.yml
# Produces required checks: security / secrets, security / trivy (+ analyze if CodeQL on)
#
# PR-only + weekly schedule. Schedule runs the heavy full-history/full-DB scan
# off the PR path. Draft PRs skip; schedule always runs.
name: Security
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 6 * * 1" # weekly full scan, Mon 06:00 UTC
jobs:
  security:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: YOUR-ORG/CICD/.github/workflows/security.yml@v1
    secrets: inherit
    # with:
    #   codeql-languages: "javascript-typescript" # set to enable CodeQL; omit to skip
